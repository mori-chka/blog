<h2>百年文庫『汝』(吉屋信子、山本有三、石川達三)</h2>

<p>
  ◇2026年6月4日(木)読了。
</p>
  
<p>
  日本や外国の作家による短編アンソロジー。<br>
  漢字一文字の『汝』がイメージされる作品を編んだものらしい。<br>
</p>

<p>
  吉屋信子『もう一人の私』。亡くなった双子の姉の幻影を見る女性。<br>
  山本有三『チョコレート』。裕福な家庭に育つも就職先が見つからない男性。<br>
  石川達三『自由詩人』。『私』の友人である詩人の破滅を描く。<br>
</p>

<p>
  文字が大きく、読みやすい。シリーズの他の本も読みたい。
</p>
